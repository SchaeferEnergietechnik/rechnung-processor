name: Build Windows Executable

on:
  push:
    branches: [main, master]
    tags:
      - 'v*'
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # Manuelles Triggern möglich

jobs:
  build:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install system dependencies (Tesseract)
        run: |
          choco install tesseract
          choco install poppler
      
      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pdf2image pytesseract pyinstaller
      
      - name: Build executable
        run: |
          pyinstaller --onefile --console --name RechnungProcessor rechnung_processor.py
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: RechnungProcessor-Windows
          path: dist/RechnungProcessor.exe
      
      - name: Create Release (on tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v1
        with:
          files: dist/RechnungProcessor.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
